<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='12' fill='%231f2937'/%3E%3Cpath d='M14 46V18h36v28H14Z' fill='none' stroke='%23f8fafc' stroke-width='5'/%3E%3Cpath d='M32 18v28M14 32h36' stroke='%23f97316' stroke-width='4'/%3E%3C/svg%3E" />
    <title>間取りクイック3D</title>
  </head>
  <body>
    <div id="app">
      <header class="topbar">
        <div class="brand">
          <div class="brand-mark">間</div>
          <div>
            <strong>間取りクイック3D</strong>
            <span id="saveStatus">保存済み</span>
          </div>
        </div>
        <div class="top-actions">
          <div class="view-switch" aria-label="表示切替">
            <button class="is-active" type="button" data-view-mode="split" title="2Dと3Dを同時表示">
              <i data-lucide="columns-2"></i>
              <span>同時</span>
            </button>
            <button type="button" data-view-mode="plan" title="2Dのみ表示">
              <i data-lucide="square"></i>
              <span>2D</span>
            </button>
            <button type="button" data-view-mode="three" title="3Dのみ表示">
              <i data-lucide="box"></i>
              <span>3D</span>
            </button>
          </div>
          <button class="icon-button" id="undoButton" type="button" title="元に戻す" aria-label="元に戻す">
            <i data-lucide="undo-2"></i>
          </button>
          <button class="icon-button" id="redoButton" type="button" title="やり直す" aria-label="やり直す">
            <i data-lucide="redo-2"></i>
          </button>
          <button class="text-button" id="exportButton" type="button">
            <i data-lucide="download"></i>
            <span>書き出し</span>
          </button>
          <button class="text-button" id="importButton" type="button">
            <i data-lucide="upload"></i>
            <span>読み込み</span>
          </button>
          <button class="text-button danger" id="resetButton" type="button">
            <i data-lucide="rotate-ccw"></i>
            <span>新規</span>
          </button>
          <input id="importInput" type="file" accept="application/json" hidden />
        </div>
      </header>

      <main class="workspace">
        <aside class="tool-panel">
          <section class="tool-section">
            <h2>ツール</h2>
            <div class="tool-grid">
              <button class="tool-button is-active" type="button" data-tool="select" title="選択">
                <i data-lucide="mouse-pointer-2"></i>
                <span>選択</span>
              </button>
              <button class="tool-button" type="button" data-tool="room" title="部屋">
                <i data-lucide="square"></i>
                <span>部屋</span>
              </button>
              <button class="tool-button" type="button" data-tool="wall" title="壁">
                <i data-lucide="minus"></i>
                <span>壁</span>
              </button>
              <button class="tool-button" type="button" data-tool="door" title="ドア">
                <i data-lucide="door-open"></i>
                <span>ドア</span>
              </button>
              <button class="tool-button" type="button" data-tool="window" title="窓">
                <i data-lucide="panel-top-open"></i>
                <span>窓</span>
              </button>
              <button class="tool-button" type="button" data-tool="furniture" title="家具">
                <i data-lucide="armchair"></i>
                <span>家具</span>
              </button>
              <button class="tool-button" type="button" data-tool="circle" title="円">
                <i data-lucide="circle"></i>
                <span>円</span>
              </button>
              <button class="tool-button" type="button" data-tool="arc" title="円弧">
                <i data-lucide="rotate-cw"></i>
                <span>円弧</span>
              </button>
              <button class="tool-button" type="button" data-tool="erase" title="削除">
                <i data-lucide="eraser"></i>
                <span>削除</span>
              </button>
            </div>
          </section>

          <section class="tool-section">
            <h2>家具</h2>
            <div class="segmented" id="furniturePicker">
              <button type="button" class="is-active" data-furniture="sofa">ソファ</button>
              <button type="button" data-furniture="table">テーブル</button>
              <button type="button" data-furniture="bed">ベッド</button>
              <button type="button" data-furniture="desk">机</button>
              <button type="button" data-furniture="kitchen">キッチン</button>
              <button type="button" data-furniture="bath">浴槽</button>
            </div>
          </section>

          <section class="tool-section">
            <details class="template-details">
              <summary>雛形</summary>
              <div class="template-list">
                <button type="button" data-template="studio">ワンルーム</button>
                <button type="button" data-template="oneLdk">1LDK</button>
                <button type="button" data-template="twoLdk">2LDK</button>
              </div>
            </details>
          </section>

          <section class="tool-section">
            <h2>選択中</h2>
            <div id="propertiesPanel" class="properties-panel"></div>
          </section>
        </aside>

        <section class="plan-pane">
          <div class="pane-bar">
            <div>
              <strong>2D</strong>
              <span id="planStats"></span>
            </div>
            <div class="pane-actions">
              <button class="toggle-button is-active" id="dimensionToggle" type="button" title="幅・奥行を表示" aria-pressed="true">
                <i data-lucide="ruler"></i>
                <span>寸法</span>
              </button>
              <button class="icon-button" id="fitButton" type="button" title="表示を整える" aria-label="表示を整える">
                <i data-lucide="scan"></i>
              </button>
            </div>
          </div>
          <canvas id="planCanvas" aria-label="2D間取り編集キャンバス"></canvas>
        </section>

        <section class="three-pane">
          <div class="three-overlay">
            <strong>3D</strong>
            <span id="threeStats"></span>
          </div>
          <canvas id="threeCanvas" aria-label="3D間取りプレビュー"></canvas>
        </section>
      </main>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
